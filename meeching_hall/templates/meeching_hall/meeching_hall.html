{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container-fluid d-lg-none">
    <div class="row top-header">
        <div class="col">
            <p class="top-header-font text-center pb-1 pt-2 m-0">Meeching Hall</p>
        </div>
    </div>
</div>

<section class="container-fluid" id="container-fluid-padding">

    <div class="row top-header d-none d-lg-block">
        <div class="col">
            <p class="top-header-font text-center pb-1 pt-2 m-0">Meeching Hall</p>
        </div>
    </div>

    <div class="row text-box-outside">

        {% for meeching in meechings %}
        <div class="col-12 text-center">
            <p class="page-main-header text-uppercase double-underline mt-3 mb-3">
                Meeching Hall
            </p>
        </div>

        <!---Content 1--->
        <div class="text-box-inside">
            <div class="col-6 col-md-4 offset-md-2 mt-4">
                <p class="content-p">
                   {{ hall.meeching_hall_content|linebreaksbr }}
                </p>
            </div>
            <div class="col-md-6 col-md-4 mt-0 text-center margin-poster">
                <picture>
                    <source type="image/webp">
                    <img src="{{ meeching.meeching_poster.url }}" srcset="{{ meeching.meeching_poster.url }}"
                        class="img-fluid grandmas-grimm" height=600 alt="{{ meeching.name }}" />
                </picture>
            </div>
        </div>
        {% endfor %}

    </div>

</section>

{% endblock %}
